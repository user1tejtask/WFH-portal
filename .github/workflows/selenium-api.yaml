name: Run Selenium Script
on:
  workflow_dispatch:
    inputs:
      selenium_script:
        description: 'Selenium script to execute'
        required: true
        type: string
jobs:
  run-selenium:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium==4.18.1
          pip install undetected-chromedriver==3.5.5
          pip install requests==2.31.0
          pip install webdriver-manager==4.0.1
          pip install pyotp==2.9.0
          pip install cryptography==42.0.5

      # This single action replaces ALL your Chrome install steps.
      # It installs Chrome stable AND the exactly matching ChromeDriver together.
      - name: Setup Chrome + ChromeDriver (matched versions)
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
        id: setup-chrome

      - name: Install Xvfb
        run: sudo apt-get install -y xvfb

      - name: Start Xvfb
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV
          sleep 3

      - name: Set environment variables
        run: |
          echo "BROWSER=chrome" >> $GITHUB_ENV
          echo "CHROME_PATH=${{ steps.setup-chrome.outputs.chrome-path }}" >> $GITHUB_ENV
          echo "CHROMEDRIVER_PATH=${{ steps.setup-chrome.outputs.chromedriver-path }}" >> $GITHUB_ENV
          # Print versions for debugging
          ${{ steps.setup-chrome.outputs.chrome-path }} --version
          ${{ steps.setup-chrome.outputs.chromedriver-path }} --version

      - name: Execute Selenium Script
        env:
          DISPLAY: :99
        run: |
          cat > script.py << 'EOF'
          ${{ github.event.inputs.selenium_script }}
          EOF
          python script.py

      - name: Cleanup
        if: always()
        run: |
          rm -f script.py
          pkill Xvfb || true
