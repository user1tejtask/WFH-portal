name: Run Selenium Script

on:
  workflow_dispatch:
    inputs:
      selenium_script:
        description: 'Selenium script to execute'
        required: true
        type: string

jobs:
  run-selenium:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # Step 1: Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # Step 3: Install Python dependencies
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium==4.18.1
          pip install undetected-chromedriver==3.5.5
          pip install requests==2.31.0
          pip install webdriver-manager==4.0.1
          pip install pyotp==2.9.0
          pip install cryptography==42.0.5

      # Step 4: Install Chrome - FIXED VERSION
      - name: Install Chrome
        run: |
          # Clean apt cache first
          sudo apt-get clean
          sudo apt-get update || true
          
          # Install prerequisites
          sudo apt-get install -y wget gnupg
          
          # Add Google Chrome repository
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          
          # Clear apt lists and retry update with retry logic
          sudo rm -rf /var/lib/apt/lists/*
          sudo apt-get update || sudo apt-get update
          
          # Install Chrome with retry
          sudo apt-get install -y google-chrome-stable || \
            (sleep 5 && sudo apt-get update && sudo apt-get install -y google-chrome-stable)
          
          google-chrome --version

      # Alternative: Install Chrome directly without repository (MORE RELIABLE)
      - name: Alternative - Install Chrome directly
        if: failure()
        run: |
          # Direct download approach (more reliable)
          wget -q -O /tmp/google-chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y /tmp/google-chrome.deb
          google-chrome --version

      # Step 5: Install Xvfb for headless display
      - name: Install Xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      # Step 6: Start virtual display
      - name: Start Xvfb
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV
          sleep 3

      # Step 7: Set environment variables
      - name: Set environment variables
        run: |
          echo "BROWSER=chrome" >> $GITHUB_ENV

      # Step 8: Write and execute the Selenium script
      - name: Execute Selenium Script
        env:
          DISPLAY: :99
        run: |
          # Write the script to a file
          cat > script.py << 'EOF'
          ${{ github.event.inputs.selenium_script }}
          EOF

          # Execute the script
          python script.py

      # Step 9: Cleanup
      - name: Cleanup
        if: always()
        run: |
          rm -f script.py
          pkill Xvfb || true
