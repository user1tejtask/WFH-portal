name: Run Selenium Script
on:
  workflow_dispatch:
    inputs:
      selenium_script:
        description: 'Selenium script to execute'
        required: true
        type: string
jobs:
  run-selenium:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium==4.18.1
          pip install undetected-chromedriver==3.5.5
          pip install requests==2.31.0
          pip install webdriver-manager==4.0.1
          pip install pyotp==2.9.0
          pip install cryptography==42.0.5

      - name: Setup Chrome + ChromeDriver (auto-matched)
        run: |
          # Install Chrome
          wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y /tmp/chrome.deb

          # Get the exact Chrome version
          CHROME_VERSION=$(google-chrome --version | grep -oP '\d+\.\d+\.\d+\.\d+')
          CHROME_MAJOR=$(echo $CHROME_VERSION | cut -d. -f1)
          echo "Chrome version: $CHROME_VERSION (major: $CHROME_MAJOR)"

          # Download the matching ChromeDriver using Chrome for Testing API
          DRIVER_URL="https://googlechromelabs.github.io/chrome-for-testing/known-good-versions-with-downloads.json"
          CHROMEDRIVER_URL=$(curl -s $DRIVER_URL | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          versions = [v for v in data['versions'] if v['version'].startswith('$CHROME_MAJOR.')]
          # Pick the last matching version
          match = versions[-1] if versions else None
          if match:
              for d in match['downloads'].get('chromedriver', []):
                  if d['platform'] == 'linux64':
                      print(d['url'])
                      break
          ")

          echo "ChromeDriver URL: $CHROMEDRIVER_URL"
          wget -q -O /tmp/chromedriver.zip "$CHROMEDRIVER_URL"
          unzip -q /tmp/chromedriver.zip -d /tmp/chromedriver_extract
          DRIVER_BIN=$(find /tmp/chromedriver_extract -name "chromedriver" -type f)
          sudo mv "$DRIVER_BIN" /usr/local/bin/chromedriver
          sudo chmod +x /usr/local/bin/chromedriver

          # Verify both match
          google-chrome --version
          chromedriver --version

          # Export paths
          echo "CHROME_PATH=$(which google-chrome)" >> $GITHUB_ENV
          echo "CHROMEDRIVER_PATH=/usr/local/bin/chromedriver" >> $GITHUB_ENV

      - name: Install Xvfb
        run: sudo apt-get install -y xvfb

      - name: Start Xvfb
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV
          sleep 3

      - name: Execute Selenium Script
        env:
          DISPLAY: :99
          GITHUB_ACTIONS: "true"
        run: |
          cat > script.py << 'PYEOF'
          ${{ github.event.inputs.selenium_script }}
          PYEOF
          python script.py

      - name: Cleanup
        if: always()
        run: |
          rm -f script.py
          pkill Xvfb || true
